[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"

[tool.ruff]
# Match the existing code style; this is a large legacy monolith, so keep the
# lint surface focused on real errors rather than stylistic churn.
line-length = 120
target-version = "py311"

[tool.ruff.lint]
# E/F = pyflakes + pycodestyle errors. Start conservative; the monolith is not
# yet clean enough for the full default set without noise.
#   E9   syntax errors
#   F63  invalid comparisons / assertions
#   F7   misplaced statements (e.g. break outside loop)
#   F823 local variable referenced before assignment
#   F401 unused imports   F811 redefinitions
# NOTE: F821 (undefined name) is intentionally NOT selected yet. It flags five
# pre-existing, broken `_barrikade_*` references inside admin diagnostic
# endpoints (latent NameErrors in dead/redundant controls). Those endpoints are
# slated for consolidation/removal in milestone M6 (admin crawler cleanup);
# re-enable F821 once they are gone so the check guards new code.
select = ["E9", "F63", "F7", "F823", "F401", "F811"]
# main.py re-exports several names purely for backwards-compatible imports.
ignore = ["E402"]

[tool.ruff.lint.per-file-ignores]
# main.py intentionally re-imports guardrail names from lex.privacy for use by
# its many existing call sites; do not flag them as unused.
"main.py" = ["F401"]
