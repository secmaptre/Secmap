<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEX EUROPE — Lageübersicht</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0c0f; --surface: #111318; --surface2: #161a20; --border: #1e2229;
  --accent: #b91c1c; --accent2: #dc2626; --warn: #d97706; --ok: #16a34a;
  --t1: #f1f3f5; --t2: #9ba3ae; --t3: #4b5563;
}
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--t1); font-family: 'Inter', sans-serif; }
#map { position: fixed; inset: 0; z-index: 0; }
#topbar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 200; }
.tb-wordmark { font-size: 15px; font-weight: 600; color: var(--t1); }
#admin { display: none; position: fixed; inset: 44px 20px 20px 20px; background: rgba(10,12,15,0.98); border: 1px solid #333; padding: 20px; z-index: 300; overflow-y: auto; }
#admin.open { display: block; }
.admin-btn { padding: 10px 16px; margin: 5px; background: #222; border: 1px solid #444; color: #ddd; cursor: pointer; }
.admin-btn:hover { background: #333; }
.log { background: #111; padding: 10px; margin: 10px 0; font-family: monospace; white-space: pre-wrap; max-height: 300px; overflow: auto; }
</style>
</head>
<body>

<div id="map"></div>

<div id="topbar">
  <div class="tb-wordmark">LEX EUROPE</div>
  <div style="margin-left:auto; font-size:13px; color:#666;">DACH Threat Map</div>
</div>

<!-- ADMIN PANEL -->
<div id="admin">
  <h2>Systemverwaltung</h2>
  <button class="admin-btn" onclick="adminCrawl()">🚀 Crawl ausführen</button>
  <button class="admin-btn" onclick="adminHistorical()">🔄 Historisch neu laden</button>
  <button class="admin-btn" onclick="adminGrokTest()">Grok testen</button>
  <button class="admin-btn" onclick="adminClear()" style="color:#f66;">🗑️ Datenbank zurücksetzen</button>
  <button class="admin-btn" onclick="adminClose()" style="float:right;">Schließen</button>

  <div class="log" id="admin-log">Bereit...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map, allData = [];

// Admin Panel
function adminOpen() { document.getElementById("admin").classList.add("open"); loadStats(); }
function adminClose() { document.getElementById("admin").classList.remove("open"); }

document.addEventListener("keydown", e => {
  if (e.ctrlKey && e.shiftKey && e.key.toUpperCase() === "A") {
    e.preventDefault();
    document.getElementById("admin").classList.contains("open") ? adminClose() : adminOpen();
  }
});

async function apiCall(url, method = "GET") {
  const logEl = document.getElementById("admin-log");
  try {
    const res = await fetch(url, { method });
    const data = await res.json();
    logEl.textContent += `\n→ ${method} ${url}\n${JSON.stringify(data, null, 2)}\n`;
    return data;
  } catch(e) {
    logEl.textContent += `\n❌ Fehler bei ${url}: ${e.message}\n`;
  }
}

async function adminCrawl() {
  await apiCall("/api/crawl", "POST");
  setTimeout(loadStats, 2000);
}

async function adminHistorical() {
  if (confirm("Historischen Crawl neu starten?")) {
    await apiCall("/api/reset-historical", "POST");
  }
}

async function adminGrokTest() {
  await apiCall("/api/grok-test", "POST");
}

async function adminClear() {
  if (confirm("Wirklich ALLE Daten löschen?")) {
    await apiCall("/api/clear", "POST");
  }
}

async function loadStats() {
  const data = await apiCall("/api/stats");
  if (data) {
    document.getElementById("admin-log").textContent += `\nTotal Einträge: ${data.total}\n`;
  }
}

// Leaflet Map
map = L.map('map').setView([49.5, 11], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

// Initial Load
loadStats();
</script>
</body>
</html>
