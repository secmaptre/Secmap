<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LEX EUROPE // AUTHENTIFIZIERUNG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060c14;--panel:rgba(5,11,22,0.97);--pb:rgba(0,180,255,0.18);--pb2:rgba(0,200,255,0.35);
  --accent:#c5c5c8;--ag:rgba(0,200,255,0.15);--red:#dc4555;--rdg:rgba(255,51,85,0.15);
  --amber:#d99a2b;--t0:#e8f4ff;--t1:#c5c5c8;--t2:#7a8088;--t3:#2a4055;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',sans-serif;
}
html,body{
  width:100%;height:100%;background:var(--bg);
  font-family:var(--sans);color:var(--t1);
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;
}

/* Background grid */
body::before{
  content:'';position:fixed;inset:0;
  background-image:linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);
  background-size:48px 48px;
  pointer-events:none;
}
/* Scanline */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);
  pointer-events:none;
}

/* Corner decoration */
.box{
  position:relative;
  width:360px;
  background:var(--panel);
  border:1px solid var(--pb);
  padding:36px 32px;
  backdrop-filter:blur(20px);
  z-index:1;
}
.box::before,.box::after,
.box .c-br,.box .c-bl{
  content:'';position:absolute;
  width:12px;height:12px;
  border-color:var(--accent);border-style:solid;
}
.box::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.box::after{top:-1px;right:-1px;border-width:2px 2px 0 0;}
.box .c-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}
.box .c-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px;}

/* Restricted banner */
.restricted{
  font-family:var(--mono);font-size:8px;font-weight:700;letter-spacing:2.5px;
  color:var(--amber);background:rgba(240,165,0,0.1);border:1px solid rgba(240,165,0,0.25);
  padding:4px 10px;text-align:center;margin-bottom:24px;
}

/* Brand */
.brand{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
.brand-icon{font-size:22px;color:var(--accent);}
.brand-name{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:3px;color:var(--accent);}
.brand-sub{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;color:var(--t2);}

/* Error */
.error-box{
  font-family:var(--mono);font-size:10px;
  background:var(--rdg);border:1px solid rgba(255,51,85,0.3);
  color:var(--red);padding:8px 10px;margin-bottom:18px;
  border-radius:2px;
}

/* Form */
.field{margin-bottom:16px;}
.field label{display:block;font-family:var(--mono);font-size:8px;font-weight:600;letter-spacing:2px;color:var(--t2);margin-bottom:5px;}
.field input{
  width:100%;background:rgba(0,0,0,0.5);border:1px solid var(--pb);border-radius:2px;
  color:var(--t0);font-family:var(--mono);font-size:11px;padding:8px 10px;
  outline:none;transition:border-color .15s;
}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,200,255,0.07);}
.field input::placeholder{color:var(--t3);}

.btn-auth{
  width:100%;padding:10px;margin-top:6px;
  font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:2px;
  background:var(--ag);border:1px solid var(--accent);border-radius:2px;
  color:var(--accent);cursor:pointer;transition:all .15s;
}
.btn-auth:hover{background:rgba(0,200,255,0.25);}

/* Back link */
.back{margin-top:18px;text-align:center;font-family:var(--mono);font-size:9px;color:var(--t3);}
.back a{color:var(--t2);text-decoration:none;}
.back a:hover{color:var(--accent);}
</style>
</head>
<body>
<div class="box">
  <div class="c-br"></div><div class="c-bl"></div>

  <div class="restricted">⚠ ZUGANG EINGESCHRÄNKT · NUR AUTORISIERTES PERSONAL</div>

  <div class="brand">
    <span class="brand-icon">◈</span>
    <div>
      <div class="brand-name">LEX EUROPE</div>
      <div class="brand-sub">GEWALTBEREITER LINKSEXTREMISMUS · ADMIN</div>
    </div>
  </div>

  {% if error %}
  <div class="error-box">✕ {{ error }}</div>
  {% endif %}

  <form method="post" action="/admin/login">
    <div class="field">
      <label>BENUTZERNAME</label>
      <input type="text" name="username" autocomplete="username" required autofocus placeholder="Kennung eingeben">
    </div>
    <div class="field">
      <label>PASSWORT</label>
      <input type="password" name="password" autocomplete="current-password" required placeholder="••••••••••">
    </div>
    <button class="btn-auth" type="submit">→ AUTHENTIFIZIEREN</button>
  </form>

  <div class="back"><a href="/">← Zurück zur Karte</a></div>
</div>
</body>
</html>
